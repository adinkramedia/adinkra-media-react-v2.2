[functions] 
  directory = "netlify/functions"
[build]
  publish = "dist"
  command = "npm run build"

[functions]
  directory = "netlify/functions"

# ---------------------------
# PRERENDER.IO BOT REDIRECT
# ---------------------------
[[redirects]]
  from = "/*"
  to = "https://service.prerender.io/:splat"
  status = 200
  force = true
  conditions = {UserAgent = ["googlebot", "bingbot", "Yahoo! Slurp", "facebookexternalhit", "twitterbot", "linkedinbot", "Whatsapp", "WhatsApp", "SkypeUriPreview", "Slackbot-LinkExpanding"]}

# ---------------------------
# STATIC SSG ROUTES
# ---------------------------
[[redirects]]
  from = "/news/:slug"
  to = "/static/news/:slug/index.html"
  status = 200

[[redirects]]
  from = "/house-of-ausar/:slug"
  to = "/static/house-of-ausar/:slug/index.html"
  status = 200

# Sacred & Sovereign removed → DO NOT include redirect

# ---------------------------
# SPA FALLBACK
# ---------------------------
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
